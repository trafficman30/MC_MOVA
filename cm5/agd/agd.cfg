agd.1.zone.6.detected      = virt.405
agd.1.zone.7.detected      = virt.406
agd.1.zone.8.detected      = virt.407

agd.1.zone.1.has_car       = virt.410
agd.1.zone.2.has_car       = virt.411
agd.1.zone.3.has_car       = virt.412
agd.1.zone.4.has_car       = virt.413
