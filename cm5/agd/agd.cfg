# agd/agd.cfg
# AGD650 radar detector configuration.
# Each [AGD.N] section is one physical unit.
# Zone numbers CAN be the same across units — use unit-qualified mapping keys
# (agd.1.zone.N.type) to assign distinct virt signals per unit.
# Simulator: python agd/agd.py --port <port> --zones 8

[AGD.1]
ip    = 127.0.0.1
port  = 9003
zones = 1,2,3,4,5,6,7,8

[AGD.2]
ip    = 127.0.0.1
port  = 9004
zones = 1,2,3,4,5,6,7,8

[SETTINGS]
frame_timeout = 5.0

[CLASSES]
car        = has_car
pedestrian = has_pedestrian
bus        = has_bus
lorry      = has_lorry
cyclist    = has_cyclist

[VIRT_MAPPING]
# ── AGD.1 zones 1-8 ──────────────────────────────────────────────────────────
agd.1.zone.1.detected      = virt.400
agd.1.zone.2.detected      = virt.401
agd.1.zone.3.detected      = virt.402
agd.1.zone.4.detected      = virt.403
