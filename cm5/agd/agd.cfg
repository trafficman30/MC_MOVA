agd.1.zone.6.has_car       = virt.415
agd.1.zone.7.has_car       = virt.416
agd.1.zone.8.has_car       = virt.417

agd.1.zone.1.has_pedestrian = virt.420
agd.1.zone.2.has_pedestrian = virt.421
agd.1.zone.3.has_pedestrian = virt.422
