agd.1.zone.7.has_cyclist   = virt.436
agd.1.zone.8.has_cyclist   = virt.437

# ── AGD.2 zones 1-8 (same zone numbers, different virt range) ────────────────
agd.2.zone.1.detected      = virt.440
