# flir/flir.cfg
# Each [CAMERA.N] section is one physical FLIR camera.
# ip + port define the WebSocket endpoint (ws://<ip>:<port>).
# For the mock server: python flir_mock_server.py --port <port>
# For a real camera:   ip = camera IP, port = camera WebSocket port (typically 80 or 8080)

[CAMERA.1]
ip    = 127.0.0.1
port  = 8765
zones = 1,2,3

[CAMERA.2]
ip    = 127.0.0.1
port  = 8766
zones = 4,5

[VIRT_MAPPING]
zone.1.occupied      = virt.300
zone.2.occupied      = virt.301
zone.3.occupied      = virt.302
zone.4.occupied      = virt.303
zone.5.occupied      = virt.304

zone.1.dilemma       = virt.310
zone.2.dilemma       = virt.311
zone.3.dilemma       = virt.312
zone.4.dilemma       = virt.313
zone.5.dilemma       = virt.314

zone.1.has_pedestrian = virt.320
zone.2.has_pedestrian = virt.321
zone.3.has_pedestrian = virt.322
zone.4.has_pedestrian = virt.323
zone.5.has_pedestrian = virt.324

zone.1.has_bicycle   = virt.325
zone.2.has_bicycle   = virt.326
zone.3.has_bicycle   = virt.327
zone.4.has_bicycle   = virt.328
zone.5.has_bicycle   = virt.329

zone.1.has_vehicle   = virt.330
zone.2.has_vehicle   = virt.331
zone.3.has_vehicle   = virt.332
zone.4.has_vehicle   = virt.333
zone.5.has_vehicle   = virt.334

any_pedestrian       = virt.340
any_bicycle          = virt.341
any_vehicle          = virt.342

any_occupied         = virt.350
any_dilemma          = virt.351
