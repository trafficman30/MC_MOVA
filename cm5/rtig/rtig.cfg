# rtig/rtig.cfg
# RTIG service configuration

[RTIG]
port          = 9010
pulse_seconds = 2.0
rules_file    = rtig_rules.json

[SIGNAL_MAP]
# Logical names used in rtig_rules.json → actual IO bus signals
# RTIG1 = xkop.o.0 means rule "signal: RTIG1" fires xkop.o.0
RTIG1 = virt.10
RTIG2 = virt.11
RTIG3 = virt.12
RTIG4 = virt.13
RTIG5 = virt.14
