# platform.cfg
# CM5 Platform — managed via web configuration editor

[SERVICES]
io           = enabled
xkop         = enabled
ug405        = enabled
rtig         = enabled
conditioner  = enabled
rpdb         = disabled
iobus_socket = disabled
flir         = enabled
agd          = enabled
autodim      = enabled
offline_plan = enabled
io_fault_timeout = 30
memory_limit_mb  = 300

[XKOP]
ip   = 192.168.71.97
port = 8004
mode = client

[LOGGING]
level      = INFO
log_max_mb = 10
log_keep   = 10
