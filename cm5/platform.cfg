# platform.cfg
# CM5 Platform — managed via web configuration editor

[SERVICES]
io           = enabled
xkop         = enabled
ug405        = enabled
rtig         = enabled
conditioner  = enabled
rpdb         = disabled
iobus_socket = enabled
flir         = enabled
agd          = enabled
autodim      = enabled
offline_plan = enabled
io_fault_timeout = 30
memory_limit_mb  = 300
mova_streams = 8
web_port     = 12008

[XKOP]
ip   = 192.168.71.97
port = 8004
mode = client

[LOGGING]
level      = INFO
log_max_mb = 10
log_keep   = 10
