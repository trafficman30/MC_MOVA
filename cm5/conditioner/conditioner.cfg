# conditioner/conditioner.cfg
# IO Conditioner rules
#
# Left side  = output signal (must be virt.N)
# Right side = expression or function call
#
# ── Signal registration ───────────────────────────────────────────────────────
# virt.* outputs are registered automatically by the conditioner. No action needed.
#
# Input signals must be registered on the bus before the conditioner starts.
# Where to register depends on signal type:
#
#   xkop.i.*  already in ug405.cfg as utcReply  → registered automatically
#   xkop.i.*  NOT in ug405.cfg                  → add to io.cfg [INPUTS]
#   gpio.i.*                                     → add to io.cfg [INPUTS]
#   virt.*    (output of another rule)           → registered automatically
#   modbus.i.* / future drivers                  → add to io.cfg [INPUTS]
#
# Simple rule: if it is not a virt.* and not a utcReply in ug405.cfg,
#              add it to io.cfg [INPUTS] with the correct driver as owner.
#
######################################################################################
# Example io.cfg [INPUTS] section:
#   [INPUTS]
#   xkop.i.151 = xkop_driver
#   xkop.i.152 = xkop_driver
#   gpio.i.1   = gpio_driver
#
######################################################################################
# ── Boolean operators ─────────────────────────────────────────────────────────
# AND  OR  NOT  XOR
# Rules are evaluated in order — virt.* outputs can chain into later rules.
#
# ── Functions ─────────────────────────────────────────────────────────────────
# Timers:
#   ON_DELAY(signal, seconds)         output goes on after input has been on for N seconds
#   OFF_DELAY(signal, seconds)        output stays on for N seconds after input drops
#   PULSE(signal, seconds)            pulse output for N seconds on rising edge of input
#
# Alarms:
#   WATCHDOG(signal, seconds)         output on if input stuck on longer than N seconds
#   MISSING(signal, seconds)          output on if no activity on input for N seconds
#
# Edge detection:
#   RISING_EDGE(signal)               one-tick pulse on rising edge
#   FALLING_EDGE(signal)              one-tick pulse on falling edge
#
# Memory:
#   LATCH(set=signal, reset=signal)   SR latch — set on rise of set, clear on rise of reset
#   TOGGLE(signal)                    flips state on each rising edge
#
# Counters:
#   COUNT_UP(signal)                  increment integer counter on each rising edge
#   COUNT_UP(signal, reset=signal)    as above with reset
#   COUNT_DOWN(signal, start=N)       decrement from N, floors at 0
#   COUNT(signal, n=N, reset=signal)  output on after N rising edges, reset on reset signal
#   N1COUNT(a=sig, b=sig, c=sig)      3-loop vehicle counter — A and C always count,
#                                     B counts only if isolated (A=0 and C=0 at rise and fall)
#   FACTOR(virt.N, bit=N)             extract bit N from integer virt — use for binary encoding
#                                     of N1COUNT output (bit=0→1s, 1→2s, 2→4s, 3→8s)
#
# Bidirectional counter — COUNT_UP and COUNT_DOWN share one register via OR:
#   virt.N = COUNT_UP(sig) OR COUNT_DOWN(sig)
#
# Nesting — inner call resolved automatically, no intermediate virt needed:
#   virt.N = PULSE(FALLING_EDGE(sig), 5.0)
#   virt.N = COUNT_UP(RISING_EDGE(sig)) OR COUNT_DOWN(FALLING_EDGE(sig))
#
# Speed:
#   SPEED(det1=sig, det2=sig, distance_m=N)   speed in km/h from two loops N metres apart
#
# ─────────────────────────────────────────────────────────────────────────────
[IO]
 virt.0 = (xkop.i.151) AND (xkop.i.152)
 virt.2 = COUNT_UP(virt.464) OR COUNT_DOWN(virt.465)
 virt.3 = virt.464
 virt.501 = COUNT_UP(virt.500)
 virt.502 = TOGGLE(virt.501)
