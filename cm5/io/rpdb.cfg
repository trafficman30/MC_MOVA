# rpdb.cfg
# RPDB IO driver configuration
# Place in: /opt/CM5/io/rpdb.cfg
#
# ── Subscription behaviour ────────────────────────────────────────────────────
# On-change (0x10) is NOT supported on PTC-1 firmware.
# On-time (0x11) pushes on value change AND as a heartbeat every N ticks.
# 1 tick = 100ms. ticks=600 = push on change + heartbeat every 60s.
# This is the recommended setting for all parameters.
#
# ── Signal registration ───────────────────────────────────────────────────────
# Input signals are registered automatically at startup.
# Format: rpdb.i.<prefix>.<index>  e.g. rpdb.i.xsg.0, rpdb.i.xout.3
#
# Output signals (rpdb.o.*) must be registered in io.cfg [INPUTS] with
# owner = rpdb_driver. They are validated against controller name arrays
# at startup. A warning is logged if the signal is not found.
#
# ── Example conditioner rules ─────────────────────────────────────────────────
#   virt.0 = rpdb.i.xsg.0                   ; phase A green
#   virt.1 = rpdb.i.xsg.0 AND rpdb.i.xsg.1  ; phase A and B green
#
# ── Example ug405.cfg utcReply ────────────────────────────────────────────────
#   utcReplyVSn[1] = rpdb.i.xsg.0           ; SCOOT uses PTC-1 phase A
#   utcReply[1]    = rpdb.o.xout.0          ; UTC sets PTC-1 output 0
#
# ── Bus namespace slots ───────────────────────────────────────────────────────
# These are defined in io_bus.py NAMESPACES['rpdb']:
#   rpdb.i.xsg.0-63      slots 2048-2111   (64  signal groups)
#   rpdb.i.xdet.0-255    slots 2112-2367   (256 detectors)
#   rpdb.i.xin.0-255     slots 2368-2623   (256 physical inputs)
#   rpdb.i.xout.0-255    slots 2624-2879   (256 outputs)
#   rpdb.i.stg.0-63      slots 2880-2943   (64  stages)
#   rpdb.i.mode.0-31     slots 2944-2975   (32  stream modes)
#   rpdb.o.xout.0-255    slots 3072-3327   (256 output writes)
#
# ─────────────────────────────────────────────────────────────────────────────

[RPDB]
host           = 192.168.71.101
port           = 35340
username       = user
password       = Peek
write_password = 3145

[SUBSCRIBE]
# parameter = bus_prefix , ticks
# ticks=600 means: push on change + heartbeat every 60s (confirmed behaviour)
XSG.CSC  = rpdb.i.xsg  , 600
XOUT.CSC = rpdb.i.xout , 600
XDET.STS = rpdb.i.xdet , 600
#
# Add further parameters as needed:
# XDET.STS = rpdb.i.xdet , 600
# STGC.STS = rpdb.i.stg  , 600

[NAMES]
# parameter = name_parameter
# Fetched once at startup via GET_TEXT to map element index to friendly name.
# Used for debug logging only — bus signals always use numeric index form.
# Omit if no name parameter available for a subscription.
XSG.CSC  = XSG.I
XOUT.CSC = XOUT.I
XDET.STS = XDET.I

[OUTPUTS]
# Write-only Par DB mappings — no subscription needed
# format: bus_signal = PARDB_PARAM , element_index
#
# Example — GP counters (write from UTC control or conditioner):
rpdb.o.1 = VIRTUAL_IN , 0
rpdb.o.2 = VIRTUAL_IN , 1
rpdb.o.3 = VIRTUAL_IN , 2
rpdb.o.4 = VIRTUAL_IN , 3
rpdb.o.5 = VIRTUAL_IN , 4
rpdb.o.6 = VIRTUAL_IN , 5
rpdb.o.7 = VIRTUAL_IN , 6
rpdb.o.10 = VIRTUAL_IN , 9
rpdb.o.14 = VIRTUAL_IN , 13
rpdb.o.15 = VIRTUAL_IN , 14
rpdb.o.16 = VIRTUAL_IN , 15

rpdb.o.17 = VIRTUAL_IN , 16
rpdb.o.18 = VIRTUAL_IN , 17
rpdb.o.19 = VIRTUAL_IN , 18
rpdb.o.20 = VIRTUAL_IN , 19
rpdb.o.32 = VIRTUAL_IN , 31
#
# Example — force a stage:
# rpdb.o.stage.0 = STGC.CMD , 0
